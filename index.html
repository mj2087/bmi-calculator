<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>健康评估报告</title>
<style>
:root {
  --primary: #1e3a5f;
  --bg: #f4f6f9;
  --card: #ffffff;
  --text: #1e3a5f;
  --muted: #6c7a92;
}

* {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
}

body {
  margin: 0;
  background: var(--bg);
  padding: 14px;
  font-size: 16px;
}

.card {
  background: var(--card);
  border-radius: 18px;
  padding: 22px 18px;
  box-shadow: 0 10px 30px rgba(30, 58, 95, 0.12);
  margin-bottom: 16px;
}

h1 {
  font-size: 22px;
  text-align: center;
  margin: 0 0 6px;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 18px;
}

label {
  font-size: 15px;
  font-weight: 600;
  margin-top: 14px;
  display: block;
}

input {
  width: 100%;
  margin-top: 6px;
  padding: 14px 12px;
  font-size: 17px;
  border-radius: 12px;
  border: 1px solid #cfd6e4;
}

button {
  margin-top: 20px;
  width: 100%;
  padding: 16px;
  font-size: 18px;
  border: none;
  border-radius: 14px;
  background: var(--primary);
  color: #fff;
}

.report {
  display: none;
}

.report h2 {
  font-size: 20px;
  margin: 0 0 12px;
}

.line {
  display: flex;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid #eee;
  font-size: 15px;
}

.status {
  font-weight: 600;
}

.history {
  font-size: 14px;
}

.record {
  background: #f0f4fa;
  border-radius: 12px;
  padding: 12px;
  margin-top: 10px;
}

.time {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 6px;
}
</style>
</head>

<body>

<div class="card" id="inputArea">
  <h1>健康评估报告</h1>
  <div class="subtitle">BMI · 血糖 · 血脂 · 一键保存</div>

  <label>身高（cm）</label>
  <input id="h" type="number" placeholder="170" />

  <label>体重（kg）</label>
  <input id="w" type="number" placeholder="65" />

  <label>空腹血糖（mmol/L）</label>
  <input id="g" type="number" placeholder="5.0" />

  <label>甘油三酯 TG</label>
  <input id="tg" type="number" placeholder="1.4" />

  <label>总胆固醇 TC</label>
  <input id="tc" type="number" placeholder="4.8" />

  <label>HDL-C</label>
  <input id="hdl" type="number" placeholder="1.2" />

  <label>LDL-C</label>
  <input id="ldl" type="number" placeholder="2.8" />

  <button onclick="calc()">生成评估报告</button>
</div>

<div class="card report" id="report">
  <h2>🩺 评估报告</h2>
  <div id="content"></div>
  <button onclick="backToInput()">返回修改</button>
</div>

<div class="card history">
  <strong>📜 历史记录</strong>
  <div id="historyList"></div>
</div>

<script>
function calc() {
  const h = +h.value, w = +w.value, g = +g.value;
  const tg = +tg.value, tc = +tc.value, hdl = +hdl.value, ldl = +ldl.value;

  if ([h,w,g,tg,tc,hdl,ldl].some(v => !v)) {
    alert("请填写完整数据");
    return;
  }

  const bmi = (w / ((h/100)**2)).toFixed(1);
  const time = new Date().toLocaleString();

  const result = `
    <div class="line"><span>BMI</span><span class="status">${bmi}</span></div>
    <div class="line"><span>空腹血糖</span><span>${g} mmol/L</span></div>
    <div class="line"><span>甘油三酯</span><span>${tg} mmol/L</span></div>
    <div class="line"><span>总胆固醇</span><span>${tc} mmol/L</span></div>
    <div class="line"><span>HDL-C</span><span>${hdl} mmol/L</span></div>
    <div class="line"><span>LDL-C</span><span>${ldl} mmol/L</span></div>
  `;

  document.getElementById("content").innerHTML = result;
  inputArea.style.display = "none";
  report.style.display = "block";

  saveHistory({ time, bmi, g, tg, tc, hdl, ldl });
}

function backToInput() {
  report.style.display = "none";
  inputArea.style.display = "block";
}

function saveHistory(data) {
  let list = JSON.parse(localStorage.getItem("health") || "[]");
  list.unshift(data);
  list = list.slice(0, 10);
  localStorage.setItem("health", JSON.stringify(list));
  renderHistory();
}

function renderHistory() {
  const list = JSON.parse(localStorage.getItem("health") || "[]");
  historyList.innerHTML = list.map(r => `
    <div class="record">
      <div class="time">${r.time}</div>
      <div>BMI：${r.bmi}｜血糖：${r.g}</div>
    </div>
  `).join("");
}

renderHistory();
</script>

</body>
</html>
